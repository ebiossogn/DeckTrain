<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fond carré arrondi noir -->
  <rect width="32" height="32" rx="6" ry="6" fill="#111111"/>
  <!-- Bordure subtile en or -->
  <rect width="32" height="32" rx="6" ry="6" fill="none" stroke="#C8B89A" stroke-width="1" opacity="0.4"/>
  <!-- D en blanc -->
  <text x="4" y="23" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FFFFFF">D</text>
  <!-- T en or -->
  <text x="16" y="23" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#C8B89A">T</text>
</svg>
